<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard - Inventory Management System</title>
        <link rel="stylesheet" href="CSS_dashboard/style.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    </head>
    <body>
        <div id="dashboardMainConteiner">
            <div class="dashboard_sidebar" id="dashboard_sidebar">
                <h3 class="dashboard_logo">IMS</h3>
                <div class="dashboard_sidebar_user">
                    <img src="img/image_perfil.jpg" alt="User image." id="userImage">
                    <span>Gomez</span>
                </div>
                <div class="dashboard_sidebar_user_menus">
                    <ul class="dashboard_menu_lists">
                        <li>
                            <a href="javascript:void(0)"><i class="bi bi-speedometer2 menuIcons"></i> Dashboard</a>
                        </li>
                        <li>
                            <a href=""><i class="bi bi-speedometer2 menuIcons"></i> Dashboard</a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="dashboard_content_conteiner" id="dashboard_content_conteiner">
                <div class="dashboard_topNav">
                    <a href="" class="list"><i class="bi bi-list"></i></a>
                    <a href="" class="log-out"><i class="bi bi-power"></i> Log-out</a>
                </div>
                <div class="dashboard_content">
                    <div class="dashboard_content_main">

                    </div>
                </div>
            </div>
        </div>

        <script>
            const list = document.querySelector(".list");

            list.addEventListener('click', (event) => { 
                event.preventDefault();
                dashboard_sidebar.style.width = '20%';
                dashboard_content_conteiner.style.width = '80%';
                userImage.style.width = '80px'; 
                
                menuIcons = document.getElementsByClassName('menuIcons');
                console.log(menuIcons);
            });
        </script>
    </body>
</html>
